name: Predictive Maintenance Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USERNAME: ${{ secrets.HF_USERNAME }}
      HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
      HF_MODEL_REPO: ${{ secrets.HF_MODEL_REPO }}
      HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          pwd
          ls -R .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify required secrets
        run: |
          python - << 'PY'
          import os
          req = ["HF_TOKEN","HF_USERNAME","HF_DATASET_REPO","HF_MODEL_REPO","HF_SPACE_REPO"]
          missing = [k for k in req if not os.environ.get(k)]
          if missing:
            raise SystemExit(f"Missing GitHub Secrets: {missing}")
          print("✅ All required secrets are present")
          PY

      - name: Run training pipeline
        run: |
          python scripts/train_pipeline.py

      - name: Run inference pipeline
        run: |
          python scripts/inference_pipeline.py

      - name: List generated artifacts
        run: |
          ls -R .
